<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="homeScreen">
        <h1>Ghost Escape</h1>
        <div id="menu">
            <button id="playBtn">Play</button>
            <button id="settingsBtn">Settings</button>
            <button id="exitBtn">Exit</button>
        </div>

        <div class="ghost ghost1"></div>
        <div class="ghost ghost2"></div>
        <div class="ghost ghost3"></div>
    </div>

    <div id="levelScreen">
        <h1>Select level</h1>
        <div id="levels">
            <button class="levelBtn" data-level="1">Level 1</button>
            <button class="levelBtn" data-level="2">Level 2</button>
            <button class="levelBtn" data-level="3">Level 3</button>
            <button class="levelBtn" data-level="4">Level 4</button>
            <button class="levelBtn" data-level="5">Level 5</button>
        </div>
        <button id="backBtn">HOME</button>
    </div>

<script src="script.js"></script>    
</body>    
</html>
